[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "check-executables-have-shebangs"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"

[[repos.hooks]]
id = "detect-private-key"

[[repos.hooks]]
id = "end-of-file-fixer"
exclude = "^cli/tests/.*\\.out$"

[[repos.hooks]]
id = "trailing-whitespace"
exclude = "^(cli/tests/.*\\.out|core/tests/.*\\.md)$"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "do-not-submit"
name = "Check for [D]O NOT SUBMIT markers"
language = "system"
entry = "sh"
args = ["-c", '! grep -rn "[D]O NOT SUBMIT" --exclude-dir=.git --exclude-dir=target .']
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "check-versions"
name = "Check version consistency"
language = "script"
entry = "admin/check-versions.sh"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "cargo-rust"
name = "Check Rust code (clippy + fmt)"
language = "script"
entry = "admin/check-rust.sh"
pass_filenames = false
always_run = true
